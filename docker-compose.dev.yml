services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-biblioteca}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-biblioteca}
      POSTGRES_DB: ${POSTGRES_DB:-biblioteca_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biblioteca}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: biblioteca_storage_dev
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    environment:
      MINIO_ROOT_USER: ${STORAGE_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET:-minioadmin}
    volumes:
      - minio_dev_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${STORAGE_KEY:-minioadmin} ${STORAGE_SECRET:-minioadmin};
        mc mb --ignore-existing local/pages-originals;
        mc mb --ignore-existing local/pages-display;
        mc mb --ignore-existing local/pages-thumb;
        mc anonymous set download local/pages-display;
        mc anonymous set download local/pages-thumb;
      "

  rabbitmq:
    image: rabbitmq:4-management
    container_name: biblioteca_rabbitmq_dev
    restart: unless-stopped
    ports:
      - "5672:5672"     # AMQP port
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_dev_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biblioteca_app_dev
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: development
      LOG_LEVEL: debug
      JWT_SECRET: ${JWT_SECRET:-troque-me-por-algo-seguro-de-pelo-menos-32-caracteres}
      JWT_EXPIRY_DAYS: 7
      DATABASE_URL: postgres://${POSTGRES_USER:-biblioteca}:${POSTGRES_PASSWORD:-biblioteca}@postgres:5432/${POSTGRES_DB:-biblioteca_db}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_KEY: ${STORAGE_KEY:-minioadmin}
      STORAGE_SECRET: ${STORAGE_SECRET:-minioadmin}
      STORAGE_REGION: us-east-1
      STORAGE_PATH_STYLE: "true"
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      OCR_JOB_RETRY_DELAY_MS: 300000
    volumes:
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json
      - ./package.json:/app/package.json
      - ./kysely.config.ts:/app/kysely.config.ts
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      /bin/sh -c "
        bun run migrate:latest &&
        bun run db:seed &&
        bun run start:dev
      "

volumes:
  postgres_dev_data:
  minio_dev_data:
  rabbitmq_dev_data:
