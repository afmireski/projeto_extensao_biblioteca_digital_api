name: biblioteca-e2e

services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: biblioteca
      POSTGRES_PASSWORD: biblioteca
      POSTGRES_DB: biblioteca_db_test
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biblioteca"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: biblioteca_storage_test
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"   # API S3
      - "9003:9001"   # Console web
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data_test:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/pages-originals;
        mc mb --ignore-existing local/pages-display;
        mc mb --ignore-existing local/pages-thumb;
        mc anonymous set download local/pages-display;
        mc anonymous set download local/pages-thumb;
      "

  rabbitmq:
    image: rabbitmq:4-management
    container_name: biblioteca_rabbitmq_test
    restart: unless-stopped
    ports:
      - "5673:5672"     # AMQP port
      - "15673:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data_test:/var/lib/rabbitmq

volumes:
  postgres_data_test:
  minio_data_test:
  rabbitmq_data_test:
