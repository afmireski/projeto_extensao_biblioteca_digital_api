openapi: 3.0.0
info:
  title: Biblioteca Digital API
  version: 0.0.0
tags:
  - name: auth
  - name: users
  - name: Sources
  - name: Editions
paths:
  /api/auth/login:
    post:
      operationId: Auth_login
      description: |-
        Authenticates a user with email and password.
        Returns a signed JWT along with the user's email and name.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: Registered user email.
                password:
                  type: string
                  description: User password (min 8 characters).
              required:
                - email
                - password
  /api/editions/create:
    post:
      operationId: Editions_create
      description: |-
        Create a new edition.
        Requires manager role. Validates that the referenced source exists.
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Edition'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Editions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEditionDTO'
  /api/editions/list:
    get:
      operationId: Editions_list
      description: |-
        List editions with filtering, ordering, and pagination.
        Only editions whose parent source is not soft-deleted are returned.
        Supports filtering by: number, published_at (range), source_name, source_type, source_language.
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
          explode: false
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
          explode: false
        - name: number
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: published_at_gte
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: published_at_lte
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: source_name
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: source_type
          in: query
          required: false
          schema:
            type: string
          explode: false
        - name: source_language
          in: query
          required: false
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListEditionsResult'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Editions
  /api/editions/{id}:
    get:
      operationId: Editions_getById
      description: |-
        Get an edition by ID.
        Returns 404 if the edition or its parent source is soft-deleted.
        Response includes source metadata (name, type, language).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EditionWithSource'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Editions
  /api/editions/{id}/delete:
    delete:
      operationId: Editions_deleteOp
      description: |-
        Soft-delete an edition.
        Requires manager role.
        Returns 404 if the edition or its parent source is soft-deleted.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Editions
  /api/editions/{id}/update:
    patch:
      operationId: Editions_update
      description: |-
        Update an edition.
        Requires manager role. source_id is immutable and cannot be changed.
        Returns 404 if the edition or its parent source is soft-deleted.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Edition'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Editions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEditionDTO'
  /api/sources/create:
    post:
      operationId: Sources_create
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
        '400':
          description: The server could not understand the request due to invalid syntax.
        '401':
          description: Access is unauthorized.
        '403':
          description: Access is forbidden.
      tags:
        - Sources
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSourceDTO'
  /api/sources/list:
    get:
      operationId: Sources_list
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
          explode: false
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSourcesResult'
        '401':
          description: Access is unauthorized.
      tags:
        - Sources
  /api/sources/{id}:
    get:
      operationId: Sources_getById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
        '401':
          description: Access is unauthorized.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - Sources
  /api/sources/{id}/delete:
    delete:
      operationId: Sources_deleteOp
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '401':
          description: Access is unauthorized.
        '403':
          description: Access is forbidden.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - Sources
  /api/sources/{id}/update:
    patch:
      operationId: Sources_update
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
        '400':
          description: The server could not understand the request due to invalid syntax.
        '401':
          description: Access is unauthorized.
        '403':
          description: Access is forbidden.
        '404':
          description: The server cannot find the requested resource.
      tags:
        - Sources
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSourceDTO'
  /api/users/delete-account:
    delete:
      operationId: Users_deleteAccount
      description: |-
        Soft-deletes the authenticated user's account and revokes all sessions.
        Always returns 204, even if the account was already deleted.
        Requires a valid Bearer token.
      parameters:
        - name: authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - users
  /api/users/profile:
    get:
      operationId: Users_profile
      description: |-
        Returns the profile of the authenticated user.
        Requires a valid Bearer token.
      parameters:
        - name: authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - users
  /api/users/signout:
    post:
      operationId: Users_signout
      description: |-
        Revokes the current session (signs out from the current device).
        Requires a valid Bearer token.
      parameters:
        - name: authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - users
  /api/users/signup:
    post:
      operationId: Users_signup
      description: |-
        Registers a new user account with role `reader`.
        Returns the email of the created user.
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                required:
                  - email
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: The request conflicts with the current state of the server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                  description: Min 8 characters.
              required:
                - name
                - email
                - password
  /api/users/update-password:
    post:
      operationId: Users_updatePassword
      description: |-
        Changes the authenticated user's password.
        Revokes all active sessions on success, requiring re-authentication.
        Requires a valid Bearer token.
      parameters:
        - name: authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                old_password:
                  type: string
                  description: Current password.
                password:
                  type: string
                  description: New password (min 8 characters).
                confirm_password:
                  type: string
                  description: Must match `password`.
              required:
                - old_password
                - password
                - confirm_password
  /api/users/update-profile:
    patch:
      operationId: Users_updateProfile
      description: |-
        Updates the authenticated user's name and/or email.
        If the new email conflicts with an existing account, the response is
        still 200 (masked conflict to prevent user enumeration).
        Requires a valid Bearer token.
      parameters:
        - name: authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
components:
  schemas:
    CreateEditionDTO:
      type: object
      required:
        - source_id
      properties:
        source_id:
          type: string
          description: UUID of the parent source.
        number:
          type: string
        published_at:
          type: string
          description: Date in YYYY-MM-DD format.
        notes:
          type: string
    CreateSourceDTO:
      type: object
      required:
        - name
        - type
        - language
      properties:
        collection_id:
          type: string
        name:
          type: string
        type:
          type: string
          enum:
            - newspaper
            - magazine
            - book
        language:
          type: string
        metadata:
          type: object
          additionalProperties: {}
    Edition:
      type: object
      required:
        - id
        - source_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
        source_id:
          type: string
        number:
          type: string
        published_at:
          type: string
        notes:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      description: A single edition of a source (e.g. issue nº 42 of a newspaper).
    EditionWithSource:
      type: object
      required:
        - id
        - source_id
        - created_at
        - updated_at
        - source_name
        - source_type
        - source_language
      properties:
        id:
          type: string
        source_id:
          type: string
        number:
          type: string
        published_at:
          type: string
        notes:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        source_name:
          type: string
        source_type:
          type: string
        source_language:
          type: string
      description: Edition enriched with parent source metadata. Returned by GET /{id}.
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
      description: Standard error response.
    ListEditionsResult:
      type: object
      required:
        - metadata
        - data
      properties:
        metadata:
          type: object
          properties:
            total:
              type: integer
              format: int32
            page:
              type: integer
              format: int32
            limit:
              type: integer
              format: int32
          required:
            - total
            - page
            - limit
        data:
          type: array
          items:
            $ref: '#/components/schemas/Edition'
    ListSourcesResult:
      type: object
      required:
        - metadata
        - data
      properties:
        metadata:
          $ref: '#/components/schemas/Metadata'
        data:
          type: array
          items:
            $ref: '#/components/schemas/Source'
    LoginResponse:
      type: object
      required:
        - token
        - email
        - name
      properties:
        token:
          type: string
        email:
          type: string
        name:
          type: string
      description: Payload returned on successful login.
    Metadata:
      type: object
      required:
        - total
        - page
        - limit
      properties:
        total:
          type: integer
          format: int32
        page:
          type: integer
          format: int32
        limit:
          type: integer
          format: int32
    Source:
      type: object
      required:
        - id
        - name
        - type
        - language
        - metadata
        - created_at
        - updated_at
      properties:
        id:
          type: string
        collection_id:
          type: string
        name:
          type: string
        type:
          type: string
          enum:
            - newspaper
            - magazine
            - book
        language:
          type: string
        metadata:
          type: object
          additionalProperties: {}
        created_at:
          type: string
        updated_at:
          type: string
    UpdateEditionDTO:
      type: object
      properties:
        number:
          type: string
        published_at:
          type: string
          description: Date in YYYY-MM-DD format.
        notes:
          type: string
    UpdateSourceDTO:
      type: object
      properties:
        collection_id:
          type: string
        name:
          type: string
        type:
          type: string
          enum:
            - newspaper
            - magazine
            - book
        language:
          type: string
        metadata:
          type: object
          additionalProperties: {}
    UserProfile:
      type: object
      required:
        - id
        - email
        - name
        - role
        - createdAt
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        createdAt:
          type: string
          format: date-time
      description: Authenticated user profile.
    UserRole:
      type: string
      enum:
        - reader
        - manager
servers:
  - url: http://localhost:3000
    description: Servidor local de desenvolvimento
    variables: {}
