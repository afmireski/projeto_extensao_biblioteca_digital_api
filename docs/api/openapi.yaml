openapi: 3.0.0
info:
  title: Biblioteca Digital API
  version: 0.0.0
tags:
  - name: auth
  - name: users
  - name: Sources
  - name: Editions
  - name: Pages
paths:
  /api/auth/login:
    post:
      operationId: Auth_login
      description: |-
        Authenticates a user with email and password.
        Returns a signed JWT along with the user's email and name.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedErrorResponse'
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: Registered user email.
                password:
                  type: string
                  description: User password (min 8 characters).
              required:
                - email
                - password
      security:
        - {}
  /api/editions/create:
    post:
      operationId: Editions_create
      description: |-
        Create a new edition.
        Requires manager role. Validates that the referenced source exists.
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Edition'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedErrorResponse'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenErrorResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
      tags:
        - Editions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEditionDTO'
  /api/editions/list:
    get:
      operationId: Editions_list
      description: |-
        List editions with filtering, ordering, and pagination.
        Only editions whose parent source is not soft-deleted are returned.
        Supports filtering by: number, published_at (range), source_name, source_type, source_language.
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
          explode: false
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
          explode: false
        - name: filters
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/EditionFilters'
          explode: false
        - name: order
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/EditionOrder'
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListEditionsResult'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedErrorResponse'
      tags:
        - Editions
  /api/editions/{id}:
    get:
      operationId: Editions_getById
      description: |-
        Get an edition by ID.
        Returns 404 if the edition or its parent source is soft-deleted.
        Response includes source metadata (name, type, language).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EditionWithSource'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedErrorResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
      tags:
        - Editions
  /api/editions/{id}/delete:
    delete:
      operationId: Editions_deleteOp
      description: |-
        Soft-delete an edition.
        Requires manager role.
        Returns 404 if the edition or its parent source is soft-deleted.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedErrorResponse'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenErrorResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
      tags:
        - Editions
  /api/editions/{id}/update:
    patch:
      operationId: Editions_update
      description: |-
        Update an edition.
        Requires manager role. source_id is immutable and cannot be changed.
        Returns 404 if the edition or its parent source is soft-deleted.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Edition'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedErrorResponse'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenErrorResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
      tags:
        - Editions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEditionDTO'
  /api/pages/delete-batch:
    post:
      operationId: PagesRoutes_deleteBatch
      summary: Remover Páginas em Lote
      description: Remove fisicamente os arquivos e as referências no banco de dados para as páginas informadas.
      parameters: []
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedErrorResponse'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenErrorResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorResponse'
      tags:
        - Pages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                page_ids:
                  type: array
                  items:
                    type: string
              required:
                - page_ids
  /api/pages/list:
    get:
      operationId: PagesRoutes_list
      summary: Listar Páginas por Edição
      description: Lista todas as páginas de uma edição de forma paginada.
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
          explode: false
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
          explode: false
        - name: filters
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PageFilters'
          explode: false
        - name: order
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PageOrder'
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPagesResult'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorResponse'
      tags:
        - Pages
  /api/pages/upload:
    post:
      operationId: PagesRoutes_upload
      summary: Upload de Página
      description: Recebe uma imagem em formato multipart/form-data, processa e vincula a uma edição.
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedErrorResponse'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorResponse'
      tags:
        - Pages
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                page:
                  type: string
                  format: binary
                edition_id:
                  type: string
                number:
                  type: integer
                  format: int32
              required:
                - page
                - edition_id
                - number
            encoding:
              number:
                contentType: text/plain
  /api/sources/create:
    post:
      operationId: Sources_create
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedErrorResponse'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenErrorResponse'
      tags:
        - Sources
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSourceDTO'
  /api/sources/list:
    get:
      operationId: Sources_list
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
          explode: false
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
          explode: false
        - name: filters
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SourceFilters'
          explode: false
        - name: order
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SourceOrder'
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSourcesResult'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedErrorResponse'
      tags:
        - Sources
  /api/sources/{id}:
    get:
      operationId: Sources_getById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedErrorResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
      tags:
        - Sources
  /api/sources/{id}/delete:
    delete:
      operationId: Sources_deleteOp
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedErrorResponse'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenErrorResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
      tags:
        - Sources
  /api/sources/{id}/update:
    patch:
      operationId: Sources_update
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedErrorResponse'
        '403':
          description: Access is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenErrorResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
      tags:
        - Sources
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSourceDTO'
  /api/users/delete-account:
    delete:
      operationId: Users_deleteAccount
      description: |-
        Soft-deletes the authenticated user's account and revokes all sessions.
        Always returns 204, even if the account was already deleted.
        Requires a valid Bearer token.
      parameters: []
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedErrorResponse'
      tags:
        - users
  /api/users/profile:
    get:
      operationId: Users_profile
      description: |-
        Returns the profile of the authenticated user.
        Requires a valid Bearer token.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedErrorResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
      tags:
        - users
  /api/users/signout:
    post:
      operationId: Users_signout
      description: |-
        Revokes the current session (signs out from the current device).
        Requires a valid Bearer token.
      parameters: []
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedErrorResponse'
      tags:
        - users
  /api/users/signup:
    post:
      operationId: Users_signup
      description: |-
        Registers a new user account with role `reader`.
        Returns the email of the created user.
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                required:
                  - email
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '409':
          description: The request conflicts with the current state of the server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictErrorResponse'
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                  description: Min 8 characters.
              required:
                - name
                - email
                - password
      security:
        - {}
  /api/users/update-password:
    post:
      operationId: Users_updatePassword
      description: |-
        Changes the authenticated user's password.
        Revokes all active sessions on success, requiring re-authentication.
        Requires a valid Bearer token.
      parameters: []
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedErrorResponse'
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                old_password:
                  type: string
                  description: Current password.
                password:
                  type: string
                  description: New password (min 8 characters).
                confirm_password:
                  type: string
                  description: Must match `password`.
              required:
                - old_password
                - password
                - confirm_password
  /api/users/update-profile:
    patch:
      operationId: Users_updateProfile
      description: |-
        Updates the authenticated user's name and/or email.
        If the new email conflicts with an existing account, the response is
        still 200 (masked conflict to prevent user enumeration).
        Requires a valid Bearer token.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedErrorResponse'
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
security:
  - BearerAuth: []
components:
  schemas:
    ConflictErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
      description: Conflict Error
    CreateEditionDTO:
      type: object
      required:
        - source_id
      properties:
        source_id:
          type: string
          description: UUID of the parent source.
        number:
          type: string
        published_at:
          type: string
          description: Date in YYYY-MM-DD format.
        notes:
          type: string
    CreateSourceDTO:
      type: object
      required:
        - name
        - type
        - language
      properties:
        collection_id:
          type: string
        name:
          type: string
        type:
          type: string
          enum:
            - newspaper
            - magazine
            - book
        language:
          type: string
        metadata:
          type: object
          additionalProperties: {}
    Edition:
      type: object
      required:
        - id
        - source_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
        source_id:
          type: string
        number:
          type: string
        published_at:
          type: string
        notes:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      description: A single edition of a source (e.g. issue nº 42 of a newspaper).
    EditionFilters:
      type: object
      properties:
        source_id:
          type: object
          properties:
            eq:
              type: string
        number:
          type: object
          properties:
            eq:
              type: string
            ne:
              type: string
            like:
              type: string
            in:
              type: array
              items:
                type: string
            nin:
              type: array
              items:
                type: string
        published_at:
          type: object
          properties:
            gte:
              type: string
            lte:
              type: string
    EditionOrder:
      type: object
      properties:
        number:
          type: string
          enum:
            - asc
            - desc
        published_at:
          type: string
          enum:
            - asc
            - desc
        created_at:
          type: string
          enum:
            - asc
            - desc
    EditionWithSource:
      type: object
      required:
        - id
        - source_id
        - created_at
        - updated_at
        - source_name
        - source_type
        - source_language
      properties:
        id:
          type: string
        source_id:
          type: string
        number:
          type: string
        published_at:
          type: string
        notes:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        source_name:
          type: string
        source_type:
          type: string
        source_language:
          type: string
      description: Edition enriched with parent source metadata. Returned by GET /{id}.
    ForbiddenErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          anyOf:
            - type: string
              enum:
                - auth.forbidden
            - type: string
        message:
          type: string
      description: Forbidden Error
    InternalErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - server.internal_error
        message:
          type: string
      description: Internal Server Error
    ListEditionsResult:
      type: object
      required:
        - metadata
        - data
      properties:
        metadata:
          type: object
          properties:
            total:
              type: integer
              format: int32
            page:
              type: integer
              format: int32
            limit:
              type: integer
              format: int32
          required:
            - total
            - page
            - limit
        data:
          type: array
          items:
            $ref: '#/components/schemas/Edition'
    ListPagesResult:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Page'
        meta:
          type: object
          properties:
            total:
              type: integer
              format: int32
            page:
              type: integer
              format: int32
            limit:
