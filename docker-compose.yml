services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-biblioteca}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-biblioteca}
      POSTGRES_DB: ${POSTGRES_DB:-biblioteca_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biblioteca}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: biblioteca_storage
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    environment:
      MINIO_ROOT_USER: ${STORAGE_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${STORAGE_KEY} ${STORAGE_SECRET};
        mc mb --ignore-existing local/pages-originals;
        mc mb --ignore-existing local/pages-display;
        mc mb --ignore-existing local/pages-thumb;
        mc anonymous set download local/pages-display;
        mc anonymous set download local/pages-thumb;
      "

volumes:
  postgres_data:
  minio_data:
